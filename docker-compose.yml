version: '3.9'

services:

  # ── Container 1: SQL Server Database ──────────────────────────────
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      SA_PASSWORD: "GLMSPassword@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost 
             -U sa -P GLMSPassword@123 -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 5s

  # ── Container 2: Web API Backend ──────────────────────────────────
  glms-backend-api:
    build:
      context: ./GLMS.API
      dockerfile: Dockerfile
    container_name: glms-backend-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sql-server-db,1433;
        Database=GLMSDb;User Id=sa;Password=GLMSPassword@123;
        TrustServerCertificate=True;MultipleActiveResultSets=true
      - JwtSettings__SecretKey=GLMSTechMoveSecretKey2024!SuperSecure
      - JwtSettings__Issuer=GLMS.API
      - JwtSettings__Audience=GLMS.MVC
      - JwtSettings__ExpiryHours=8
    ports:
      - "8080:8080"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network
    restart: on-failure

  # ── Container 3: MVC Frontend ─────────────────────────────────────
  glms-frontend-web:
    build:
      context: ./GLMS
      dockerfile: Dockerfile
    container_name: glms-frontend-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8081
      - ApiSettings__BaseUrl=http://glms-backend-api:8080/
    ports:
      - "8081:8081"
    depends_on:
      - glms-backend-api
    networks:
      - glms-network
    restart: on-failure

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  sqldata:

# ── Networks ───────────────────────────────────────────────────────
networks:
  glms-network:
    driver: bridge
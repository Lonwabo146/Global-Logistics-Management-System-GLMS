name: GLMS Unit Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore GLMS.Tests/GLMS.Tests.csproj

    - name: Build test project
      run: dotnet build GLMS.Tests/GLMS.Tests.csproj --no-restore

    - name: Run tests
      run: dotnet test GLMS.Tests/GLMS.Tests.csproj --no-build --verbosity normal